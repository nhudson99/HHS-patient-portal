sonar.projectKey=hhs-patient-portal
sonar.projectName=HHS Patient Portal
sonar.projectVersion=1.0

sonar.sources=src,api
sonar.tests=src,api/tests

sonar.exclusions=**/node_modules/**,**/dist/**,**/venv/**,**/.git/**,**/coverage/**
sonar.test.inclusions=**/*.spec.ts,**/test_*.py

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.python.coverage.reportPaths=coverage-python.xml

sonar.sourceEncoding=UTF-8
