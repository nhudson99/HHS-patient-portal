# Development overrides — automatically applied on top of docker-compose.yml
# when running `docker compose up` locally.
# DO NOT commit secrets here; use .env instead.

services:
  api:
    # Live-mount source so Python changes apply after a simple container restart
    # (no full image rebuild needed)
    volumes:
      - ./api:/app/api
      - ./server:/app/server
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: "1"
      # Use Flask dev server with auto-reload instead of gunicorn
    command: >
      python -m flask run
      --host=0.0.0.0
      --port=3000
      --reload
      --debugger

  nginx:
    # Live-mount the built frontend — run `npm run build` to pick up Vue changes
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
